<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>인생네컷 📸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior: contain; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(135deg, #ffeef8 0%, #f0e6ff 50%, #e6f3ff 100%);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom));
    overflow-x: hidden; color: #333;
  }
  .container { width: 100%; max-width: 480px; }
  h1 { text-align: center; font-size: 28px; font-weight: 700; margin: 8px 0 4px; color: #444; letter-spacing: -0.5px; }
  .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 16px; }
  .screen { display: none; animation: fadeIn 0.3s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .section-title { font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: #555; display: flex; align-items: center; justify-content: space-between; }
  .frame-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .frame-option {
    aspect-ratio: 0.4; border-radius: 10px; border: 3px solid transparent;
    cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative;
    background: #f0f0f0; display: flex; align-items: center; justify-content: center;
  }
  .frame-option img { width: 100%; height: 100%; object-fit: cover; }
  .frame-option .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5); color: white; font-size: 10px; font-weight: 600;
    padding: 2px 4px; text-align: center;
  }
  .frame-option.selected {
    border-color: #ff6b9d;
    box-shadow: 0 4px 12px rgba(255,107,157,0.4);
  }
  .frame-option .loading { color: #999; font-size: 11px; }

  .filter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
  .filter-option {
    aspect-ratio: 1; border-radius: 12px; border: 3px solid transparent;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .filter-option.selected { border-color: #ff6b9d; transform: scale(1.05); box-shadow: 0 4px 12px rgba(255,107,157,0.3); }
  .filter-preview {
    width: 100%; height: 100%; display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 4px; color: white; font-size: 9px; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .count-selector { display: flex; gap: 8px; margin-bottom: 12px; }
  .count-btn {
    flex: 1; padding: 10px; border: 2px solid #ddd; background: white; border-radius: 12px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .count-btn.selected { border-color: #ff6b9d; background: #fff0f5; color: #ff6b9d; }
  .camera-wrap {
    position: relative; width: 100%; aspect-ratio: 1; background: #000;
    border-radius: 20px; overflow: hidden; margin-bottom: 12px;
  }
  #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #000; }
  #video.no-mirror { transform: none; }
  .countdown {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 120px; font-weight: 800; color: white; text-shadow: 0 0 20px rgba(0,0,0,0.5);
    display: none; pointer-events: none;
  }
  .countdown.show { display: block; animation: pulse 1s ease; }
  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  .progress {
    position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); color: white;
    padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
  }
  .flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
  .flash.active { opacity: 0.9; }
  .switch-cam {
    position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white;
    border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer;
  }
  .preview-strip { display: flex; gap: 6px; margin-bottom: 12px; justify-content: center; flex-wrap: wrap; }
  .preview-thumb {
    width: 56px; height: 56px; border-radius: 8px; background: #f0f0f0; border: 2px dashed #ccc;
    overflow: hidden; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 18px;
  }
  .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .result-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  #resultCanvas { max-width: 100%; max-height: 70vh; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .btn {
    display: block; width: 100%; padding: 16px; border: none; border-radius: 16px;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: linear-gradient(135deg, #ff6b9d 0%, #c779ff 100%); color: white;
    box-shadow: 0 4px 12px rgba(255,107,157,0.3);
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: white; color: #555; border: 2px solid #ddd; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { margin-bottom: 0; }
  .notice {
    background: rgba(255,255,255,0.7); border-radius: 12px; padding: 12px;
    font-size: 12px; color: #666; margin-bottom: 12px; text-align: center; line-height: 1.5;
  }
  .notice.ok { background: #d4edda; color: #155724; }
  .error {
    background: #ffe5e5; color: #c44; padding: 12px; border-radius: 12px;
    margin-bottom: 12px; font-size: 13px; line-height: 1.6; text-align: left;
  }
  .error b { display: block; margin-bottom: 4px; font-size: 14px; }
  .error code {
    background: rgba(0,0,0,0.05); padding: 1px 6px; border-radius: 4px;
    font-size: 11px; word-break: break-all; display: inline-block;
  }
  .perm-status {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 3px 8px; border-radius: 10px; margin-left: 6px;
  }
  .perm-status.granted { background: #d4edda; color: #155724; }
  .perm-status.prompt { background: #fff3cd; color: #856404; }
  .perm-status.denied { background: #ffe5e5; color: #c44; }
  .frame-count-warn {
    font-size: 11px; color: #c44; margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📸 인생네컷</h1>
  <p class="subtitle">Life 4 Cuts · 추억을 찰칵<span id="permBadge"></span></p>

  <div class="screen active" id="setupScreen">
    <div id="envNotice"></div>

    <div class="section-title">📷 컷 수 선택</div>
    <div class="count-selector">
      <button class="count-btn" data-count="2">2컷</button>
      <button class="count-btn selected" data-count="4">4컷</button>
      <button class="count-btn" data-count="6">6컷</button>
    </div>

    <div class="section-title">
      <span>🎨 프레임</span>
      <span style="font-size: 11px; font-weight: 400; color: #999;" id="frameCountInfo"></span>
    </div>
    <div class="frame-grid" id="frameGrid"></div>

    <div class="section-title">✨ 필터</div>
    <div class="filter-grid" id="filterGrid"></div>

    <button class="btn btn-primary" id="startBtn">촬영 시작하기 →</button>
    <div id="errorBox"></div>
  </div>

  <div class="screen" id="cameraScreen">
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted webkit-playsinline></video>
      <div class="flash" id="flash"></div>
      <div class="countdown" id="countdown">3</div>
      <div class="progress" id="progress">1/4</div>
      <button class="switch-cam" id="switchCam" aria-label="카메라 전환">🔄</button>
    </div>
    <div class="preview-strip" id="previewStrip"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="cancelBtn" style="flex:1">취소</button>
      <button class="btn btn-primary" id="shootBtn" style="flex:2">📸 시작</button>
    </div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-wrap"><canvas id="resultCanvas"></canvas></div>
    <button class="btn btn-primary" id="downloadBtn">💾 이미지 저장하기</button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="retakeBtn" style="flex:1">다시 찍기</button>
      <button class="btn btn-secondary" id="newBtn" style="flex:1">처음으로</button>
    </div>
  </div>
</div>

<canvas id="captureCanvas" style="display:none"></canvas>

<script>
// ============================================================
// 🎨 프레임 등록 — 새 프레임을 추가하려면 이 배열에 추가하세요
// ============================================================
// 각 프레임 객체:
//   id: 고유 ID
//   name: 화면에 보일 이름
//   files: { 컷수: 'frames/파일명.png' } — 지원하는 컷 수만 등록
//   textColor: 다운로드 파일명용 (선택)
//
// 프레임 PNG 사양:
//   600 x H 픽셀, PNG (투명 배경 지원)
//   - 2컷:  600 x 1218 (margin30 + (540+16)*2 - 16 + 90)
//   - 4컷:  600 x 2328 (margin30 + (540+16)*4 - 16 + 90)
//   - 6컷:  600 x 3438 (margin30 + (540+16)*6 - 16 + 90)
//   사진 영역(좌:30, 우:30, 위에서 30부터 540x540 정사각형, 사이 16px gap)은 투명하게
// ============================================================
const FRAMES = [
  {
    id: 'classic',
    name: '클래식 화이트',
    files: {
      4: 'frames/frame_4cut_classic.png'
      // 2컷, 6컷 추가하려면 여기에 등록
    }
  },
  {
    id: 'pink_heart',
    name: '핑크 하트',
    files: {
      4: 'frames/frame_4cut_pink_heart.png'
    }
  },
  {
    id: 'film',
    name: '필름 스트립',
    files: {
      4: 'frames/frame_4cut_film.png'
    }
  }
];

// 컷 수별 캔버스 사이즈 계산
const FRAME_W = 600;
const FRAME_MARGIN = 30;
const FRAME_PHOTO = 540;
const FRAME_GAP = 16;
const FRAME_BOTTOM = 90;
function frameHeight(count) {
  return FRAME_MARGIN + (FRAME_PHOTO + FRAME_GAP) * count - FRAME_GAP + FRAME_BOTTOM;
}

const FILTERS = [
  { id: 'none', name: '원본', filter: 'none', preview: 'linear-gradient(135deg,#ffd1dc,#c9b6ff)' },
  { id: 'bw', name: '흑백', filter: 'grayscale(1) contrast(1.1)', preview: 'linear-gradient(135deg,#888,#222)' },
  { id: 'vintage', name: '빈티지', filter: 'sepia(0.5) contrast(1.05) saturate(0.9)', preview: 'linear-gradient(135deg,#d4b896,#8b6f47)' },
  { id: 'bright', name: '밝게', filter: 'brightness(1.15) saturate(1.2) contrast(1.05)', preview: 'linear-gradient(135deg,#fff5e6,#ffe0b3)' },
  { id: 'soft', name: '부드럽게', filter: 'brightness(1.05) contrast(0.95) saturate(0.9) blur(0.3px)', preview: 'linear-gradient(135deg,#ffe0e0,#e0d0ff)' }
];
const SETTINGS_KEY = 'life4cuts_settings_v3';

const state = { count: 4, frame: 'classic', filter: 'none', facing: 'user', stream: null, shots: [], shooting: false };
const frameImageCache = {}; // id+count -> Image

try {
  const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
  if (saved.count) state.count = saved.count;
  if (saved.frame) state.frame = saved.frame;
  if (saved.filter) state.filter = saved.filter;
  if (saved.facing) state.facing = saved.facing;
} catch(e) {}

function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify({ count: state.count, frame: state.frame, filter: state.filter, facing: state.facing })); } catch(e) {}
}

const $ = id => document.getElementById(id);
const screens = { setup: $('setupScreen'), camera: $('cameraScreen'), result: $('resultScreen') };
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

// ===== 환경 체크 =====
function checkEnvironment() {
  const isSecure = window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const hasGetUserMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  const isFile = location.protocol === 'file:';
  const box = $('envNotice');
  if (isFile) {
    box.innerHTML = `<div class="error"><b>⚠️ 모바일에서는 file://로 직접 열 수 없어요</b>📱 <b>해결:</b><br>• <b>GitHub Pages</b>에 업로드 → HTTPS URL로 접속<br>• <b>Netlify Drop</b>(<code>app.netlify.com/drop</code>)에 드래그</div>`;
    return false;
  }
  if (!isSecure) {
    box.innerHTML = `<div class="error"><b>⚠️ HTTPS가 아니에요</b>카메라는 HTTPS 또는 localhost에서만 작동해요.</div>`;
    return false;
  }
  if (!hasGetUserMedia) {
    box.innerHTML = `<div class="error"><b>⚠️ 이 브라우저는 카메라 API를 지원하지 않아요</b></div>`;
    return false;
  }
  box.innerHTML = `<div class="notice ok">✅ 카메라 사용 가능 환경이에요</div>`;
  return true;
}

async function updatePermBadge() {
  const badge = $('permBadge');
  if (!navigator.permissions || !navigator.permissions.query) { badge.innerHTML = ''; return; }
  try {
    const result = await navigator.permissions.query({ name: 'camera' });
    let cls = 'prompt', text = '권한 미설정';
    if (result.state === 'granted') { cls = 'granted'; text = '권한 허용됨'; }
    else if (result.state === 'denied') { cls = 'denied'; text = '권한 차단됨'; }
    badge.innerHTML = `<span class="perm-status ${cls}">${text}</span>`;
    result.onchange = () => updatePermBadge();
  } catch(e) { badge.innerHTML = ''; }
}

// ===== 프레임 이미지 로드 =====
function loadFrameImage(frameId, count) {
  const key = frameId + '_' + count;
  if (frameImageCache[key]) return Promise.resolve(frameImageCache[key]);
  const frame = FRAMES.find(f => f.id === frameId);
  if (!frame || !frame.files[count]) return Promise.resolve(null);
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { frameImageCache[key] = img; resolve(img); };
    img.onerror = () => {
      console.warn('프레임 로드 실패:', frame.files[count]);
      resolve(null);
    };
    img.src = frame.files[count];
  });
}

// ===== 셋업 UI =====
function getCurrentFrameSupported() {
  const frame = FRAMES.find(f => f.id === state.frame);
  return frame && frame.files[state.count];
}

function renderFrames() {
  const grid = $('frameGrid'); grid.innerHTML = '';
  FRAMES.forEach(f => {
    const div = document.createElement('div');
    const supported = !!f.files[state.count];
    div.className = 'frame-option' + (f.id === state.frame ? ' selected' : '');
    if (!supported) div.style.opacity = '0.4';

    // 썸네일: 지원하는 컷 수 중 하나 사용
    const sampleSrc = f.files[state.count] || Object.values(f.files)[0];
    if (sampleSrc) {
      const img = document.createElement('img');
      img.src = sampleSrc;
      img.alt = f.name;
      div.appendChild(img);
    } else {
      div.innerHTML = '<div class="loading">미리보기 없음</div>';
    }
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = f.name;
    div.appendChild(label);

    div.onclick = () => {
      if (!supported) {
        showError(`"${f.name}" 프레임은 ${state.count}컷을 지원하지 않아요. 다른 컷 수를 선택해 주세요.`);
        return;
      }
      state.frame = f.id;
      saveSettings();
      renderFrames();
    };
    grid.appendChild(div);
  });

  // 컷 수 정보
  const supported = FRAMES.filter(f => f.files[state.count]).length;
  $('frameCountInfo').textContent = `${state.count}컷 지원: ${supported}/${FRAMES.length}`;
}

function renderFilters() {
  const grid = $('filterGrid'); grid.innerHTML = '';
  FILTERS.forEach(f => {
    const div = document.createElement('div');
    div.className = 'filter-option' + (f.id === state.filter ? ' selected' : '');
    div.innerHTML = `<div class="filter-preview" style="background:${f.preview}">${f.name}</div>`;
    div.onclick = () => { state.filter = f.id; saveSettings(); renderFilters(); };
    grid.appendChild(div);
  });
}

function renderCountButtons() {
  document.querySelectorAll('.count-btn').forEach(btn => {
    if (parseInt(btn.dataset.count) === state.count) btn.classList.add('selected');
    else btn.classList.remove('selected');
    btn.onclick = () => {
      state.count = parseInt(btn.dataset.count);
      // 현재 프레임이 새 컷 수를 지원 안 하면 첫 번째 지원 프레임으로 변경
      if (!getCurrentFrameSupported()) {
        const fallback = FRAMES.find(f => f.files[state.count]);
        if (fallback) state.frame = fallback.id;
      }
      saveSettings();
      renderCountButtons();
      renderFrames();
    };
  });
}

renderFrames();
renderFilters();
renderCountButtons();
checkEnvironment();
updatePermBadge();

// ===== 카메라 =====
async function startCamera() {
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
  const constraintsList = [
    { video: { facingMode: { exact: state.facing }, width: { ideal: 1280 }, height: { ideal: 1280 } }, audio: false },
    { video: { facingMode: state.facing, width: { ideal: 1280 }, height: { ideal: 1280 } }, audio: false },
    { video: true, audio: false }
  ];
  let lastError = null;
  for (const c of constraintsList) {
    try {
      state.stream = await navigator.mediaDevices.getUserMedia(c);
      break;
    } catch (e) {
      lastError = e;
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') break;
    }
  }
  if (!state.stream) {
    let msg = '';
    if (!lastError) msg = '알 수 없는 오류';
    else if (lastError.name === 'NotAllowedError' || lastError.name === 'PermissionDeniedError')
      msg = '카메라 권한이 거부됐어요. 주소창의 자물쇠 아이콘 → 사이트 설정 → 카메라 허용으로 바꿔주세요.';
    else if (lastError.name === 'NotFoundError') msg = '카메라를 찾을 수 없어요.';
    else if (lastError.name === 'NotReadableError') msg = '다른 앱이 카메라를 사용 중이에요.';
    else msg = lastError.name + ': ' + lastError.message;
    showError(msg);
    return false;
  }
  const video = $('video');
  video.srcObject = state.stream;
  try { await video.play(); } catch(e) {}
  if (state.facing === 'environment') video.classList.add('no-mirror');
  else video.classList.remove('no-mirror');
  updatePermBadge();
  return true;
}

function stopCamera() {
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
}

function showError(msg) {
  $('errorBox').innerHTML = `<div class="error">${msg}</div>`;
  setTimeout(() => $('errorBox').innerHTML = '', 6000);
}

function renderPreviewStrip() {
  const strip = $('previewStrip'); strip.innerHTML = '';
  for (let i = 0; i < state.count; i++) {
    const t = document.createElement('div');
    t.className = 'preview-thumb';
    if (state.shots[i]) {
      const img = document.createElement('img');
      img.src = state.shots[i];
      t.appendChild(img);
    } else {
      t.textContent = i + 1;
    }
    strip.appendChild(t);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function countdown(seconds) {
  const el = $('countdown');
  for (let i = seconds; i > 0; i--) {
    el.textContent = i;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
    await sleep(1000);
  }
  el.classList.remove('show');
}

let _ctxFilterSupport = null;
function supportsCtxFilter() {
  if (_ctxFilterSupport !== null) return _ctxFilterSupport;
  const c = document.createElement('canvas').getContext('2d');
  c.filter = 'blur(1px)';
  _ctxFilterSupport = c.filter === 'blur(1px)';
  return _ctxFilterSupport;
}

function applyFilterFallback(ctx, size, filterId) {
  const imgData = ctx.getImageData(0, 0, size, size);
  const d = imgData.data;
  if (filterId === 'bw') {
    for (let i = 0; i < d.length; i += 4) {
      const g = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
      d[i] = d[i+1] = d[i+2] = g;
    }
  } else if (filterId === 'vintage') {
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      d[i] = Math.min(255, r * 0.7 + g * 0.5 + b * 0.2);
      d[i+1] = Math.min(255, r * 0.3 + g * 0.7 + b * 0.2);
      d[i+2] = Math.min(255, r * 0.2 + g * 0.4 + b * 0.5);
    }
  } else if (filterId === 'bright') {
    for (let i = 0; i < d.length; i += 4) {
      d[i] = Math.min(255, d[i] * 1.15);
      d[i+1] = Math.min(255, d[i+1] * 1.15);
      d[i+2] = Math.min(255, d[i+2] * 1.15);
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function captureFrame() {
  const video = $('video');
  const canvas = $('captureCanvas');
  const ctx = canvas.getContext('2d');
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return null;
  const size = Math.min(vw, vh);
  canvas.width = size; canvas.height = size;
  const sx = (vw - size) / 2, sy = (vh - size) / 2;

  const filterValue = FILTERS.find(f => f.id === state.filter).filter;
  try { ctx.filter = filterValue; } catch(e) { ctx.filter = 'none'; }

  if (state.facing === 'user') {
    ctx.save();
    ctx.translate(size, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
    ctx.restore();
  } else {
    ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
  }

  if (!supportsCtxFilter() && state.filter !== 'none') {
    applyFilterFallback(ctx, size, state.filter);
  }

  const flash = $('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 200);

  return canvas.toDataURL('image/jpeg', 0.92);
}

async function runShootSequence() {
  if (state.shooting) return;
  state.shooting = true;
  $('shootBtn').disabled = true;
  $('shootBtn').textContent = '촬영 중...';

  state.shots = [];
  for (let i = 0; i < state.count; i++) {
    $('progress').textContent = `${i + 1}/${state.count}`;
    await countdown(3);
    const dataUrl = captureFrame();
    if (dataUrl) {
      state.shots.push(dataUrl);
      renderPreviewStrip();
    }
    if (i < state.count - 1) await sleep(1200);
  }

  state.shooting = false;
  await sleep(500);
  await composeResult();
}

// ===== 결과 합성 (외부 프레임 PNG 사용) =====
async function composeResult() {
  const canvas = $('resultCanvas');
  const ctx = canvas.getContext('2d');

  const W = FRAME_W;
  const H = frameHeight(state.count);
  canvas.width = W; canvas.height = H;

  // 1) 흰 배경 깔기 (프레임 PNG가 투명일 때 빈 자리 방지)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // 2) 사진 먼저 그리기
  await Promise.all(state.shots.map((src, i) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const y = FRAME_MARGIN + i * (FRAME_PHOTO + FRAME_GAP);
      ctx.drawImage(img, FRAME_MARGIN, y, FRAME_PHOTO, FRAME_PHOTO);
      resolve();
    };
    img.onerror = resolve;
    img.src = src;
  })));

  // 3) 프레임 PNG를 사진 위에 덮어 그리기
  const frameImg = await loadFrameImage(state.frame, state.count);
  if (frameImg) {
    ctx.drawImage(frameImg, 0, 0, W, H);
  } else {
    // 프레임이 없으면 기본 텍스트만
    ctx.fillStyle = '#444';
    ctx.textAlign = 'center';
    const baseY = FRAME_MARGIN + (FRAME_PHOTO + FRAME_GAP) * state.count - FRAME_GAP;
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.fillText('LIFE 4 CUTS', W / 2, baseY + 38);
    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    ctx.font = '16px -apple-system, sans-serif';
    ctx.globalAlpha = 0.7;
    ctx.fillText(dateStr, W / 2, baseY + 68);
    ctx.globalAlpha = 1;
  }

  stopCamera();
  showScreen('result');
}

// ===== 다운로드 =====
function downloadResult() {
  const canvas = $('resultCanvas');
  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
  const filename = `life4cuts_${ts}.png`;
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

  canvas.toBlob(blob => {
    if (isIOS) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.target = '_blank';
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      setTimeout(() => alert('💾 새 창에서 이미지를 길게 눌러 "이미지 저장"을 선택해 주세요!'), 100);
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }
  }, 'image/png');
}

$('startBtn').onclick = async () => {
  if (!checkEnvironment()) return;
  if (!getCurrentFrameSupported()) {
    showError(`현재 프레임이 ${state.count}컷을 지원하지 않아요.`);
    return;
  }
  $('progress').textContent = `1/${state.count}`;
  state.shots = [];
  renderPreviewStrip();
  showScreen('camera');
  const ok = await startCamera();
  if (!ok) showScreen('setup');
};
$('switchCam').onclick = async () => {
  state.facing = state.facing === 'user' ? 'environment' : 'user';
  saveSettings();
  await startCamera();
};
$('shootBtn').onclick = () => {
  $('shootBtn').textContent = '📸 시작';
  $('shootBtn').disabled = false;
  runShootSequence();
};
$('cancelBtn').onclick = () => { stopCamera(); showScreen('setup'); };
$('downloadBtn').onclick = downloadResult;
$('retakeBtn').onclick = async () => {
  state.shots = []; renderPreviewStrip(); showScreen('camera');
  const ok = await startCamera();
  if (!ok) showScreen('setup');
};
$('newBtn').onclick = () => { state.shots = []; showScreen('setup'); };

window.addEventListener('pagehide', stopCamera);
window.addEventListener('beforeunload', stopCamera);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.stream && screens.camera.classList.contains('active')) {
    const v = $('video');
    if (v.paused) v.play().catch(()=>{});
  }
});
</script>
