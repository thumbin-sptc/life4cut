<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인생네컷 📸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(135deg, #ffeef8 0%, #f0e6ff 50%, #e6f3ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
    color: #333;
  }
  .container { width: 100%; max-width: 480px; }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    margin: 8px 0 4px;
    color: #444;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
  }
  .screen { display: none; animation: fadeIn 0.3s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* 셋업 화면 */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    margin: 16px 0 8px;
    color: #555;
  }
  .frame-grid, .filter-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .frame-option, .filter-option {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    padding: 4px;
    overflow: hidden;
    position: relative;
  }
  .frame-option.selected, .filter-option.selected {
    border-color: #ff6b9d;
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
  }
  .filter-option {
    background: #ddd;
    color: #333;
  }
  .filter-preview {
    width: 100%;
    height: 100%;
    background-image: linear-gradient(135deg, #ffd1dc 0%, #c9b6ff 100%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
    color: white;
    font-size: 9px;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .count-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .count-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid #ddd;
    background: white;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .count-btn.selected {
    border-color: #ff6b9d;
    background: #fff0f5;
    color: #ff6b9d;
  }

  /* 카메라 화면 */
  .camera-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #video.no-mirror { transform: none; }
  .countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: 800;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.5);
    display: none;
    animation: pulse 1s ease;
  }
  .countdown.show { display: block; }
  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
  .progress {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }
  .flash.active { opacity: 0.9; }
  .switch-cam {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
  }
  .preview-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    justify-content: center;
  }
  .preview-thumb {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    background: #f0f0f0;
    border: 2px dashed #ccc;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-size: 18px;
  }
  .preview-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 결과 화면 */
  .result-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }
  #resultCanvas {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }

  /* 버튼 */
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: linear-gradient(135deg, #ff6b9d 0%, #c779ff 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: white;
    color: #555;
    border: 2px solid #ddd;
  }
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn-row .btn { margin-bottom: 0; }

  .notice {
    background: rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 12px;
    font-size: 12px;
    color: #666;
    margin-bottom: 12px;
    text-align: center;
    line-height: 1.5;
  }
  .error {
    background: #ffe5e5;
    color: #c44;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>📸 인생네컷</h1>
  <p class="subtitle">Life 4 Cuts · 추억을 찰칵</p>

  <!-- 1) 시작 화면 -->
  <div class="screen active" id="setupScreen">
    <div class="notice">
      💡 카메라 권한을 허용해 주세요. HTTPS 환경에서만 동작해요.
    </div>

    <div class="section-title">📷 컷 수 선택</div>
    <div class="count-selector">
      <button class="count-btn" data-count="2">2컷</button>
      <button class="count-btn selected" data-count="4">4컷</button>
      <button class="count-btn" data-count="6">6컷</button>
    </div>

    <div class="section-title">🎨 프레임 컬러</div>
    <div class="frame-grid" id="frameGrid"></div>

    <div class="section-title">✨ 필터</div>
    <div class="filter-grid" id="filterGrid"></div>

    <button class="btn btn-primary" id="startBtn">촬영 시작하기 →</button>
    <div id="errorBox"></div>
  </div>

  <!-- 2) 카메라 화면 -->
  <div class="screen" id="cameraScreen">
    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash" id="flash"></div>
      <div class="countdown" id="countdown">3</div>
      <div class="progress" id="progress">1/4</div>
      <button class="switch-cam" id="switchCam" aria-label="카메라 전환">🔄</button>
    </div>
    <div class="preview-strip" id="previewStrip"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="cancelBtn" style="flex:1">취소</button>
      <button class="btn btn-primary" id="shootBtn" style="flex:2">📸 시작</button>
    </div>
  </div>

  <!-- 3) 결과 화면 -->
  <div class="screen" id="resultScreen">
    <div class="result-wrap">
      <canvas id="resultCanvas"></canvas>
    </div>
    <button class="btn btn-primary" id="downloadBtn">💾 이미지 저장하기</button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="retakeBtn" style="flex:1">다시 찍기</button>
      <button class="btn btn-secondary" id="newBtn" style="flex:1">처음으로</button>
    </div>
  </div>
</div>

<canvas id="captureCanvas" style="display:none"></canvas>

<script>
// ===== 설정 데이터 =====
const FRAMES = [
  { id: 'white', name: '화이트', bg: '#ffffff', text: '#333' },
  { id: 'black', name: '블랙', bg: '#1a1a1a', text: '#fff' },
  { id: 'pink', name: '핑크', bg: '#ffc6dd', text: '#8b3a5e' },
  { id: 'mint', name: '민트', bg: '#b8ecd8', text: '#2d6b54' },
  { id: 'beige', name: '베이지', bg: '#f5e9d4', text: '#7a5e3a' },
  { id: 'lavender', name: '라벤더', bg: '#d9c9f5', text: '#5a4080' },
  { id: 'sky', name: '스카이', bg: '#c6e2f5', text: '#3a6b8b' },
  { id: 'lemon', name: '레몬', bg: '#fef3a8', text: '#8b7a2e' },
  { id: 'coral', name: '코랄', bg: '#ffb8a8', text: '#8b4530' },
  { id: 'gray', name: '그레이', bg: '#d8d8d8', text: '#444' }
];

const FILTERS = [
  { id: 'none', name: '원본', filter: 'none', preview: 'linear-gradient(135deg, #ffd1dc, #c9b6ff)' },
  { id: 'bw', name: '흑백', filter: 'grayscale(1) contrast(1.1)', preview: 'linear-gradient(135deg, #888, #222)' },
  { id: 'vintage', name: '빈티지', filter: 'sepia(0.5) contrast(1.05) saturate(0.9)', preview: 'linear-gradient(135deg, #d4b896, #8b6f47)' },
  { id: 'bright', name: '밝게', filter: 'brightness(1.15) saturate(1.2) contrast(1.05)', preview: 'linear-gradient(135deg, #fff5e6, #ffe0b3)' },
  { id: 'soft', name: '부드럽게', filter: 'brightness(1.05) contrast(0.95) saturate(0.9) blur(0.3px)', preview: 'linear-gradient(135deg, #ffe0e0, #e0d0ff)' }
];

// ===== 상태 =====
const state = {
  count: 4,
  frame: 'white',
  filter: 'none',
  facing: 'user',
  stream: null,
  shots: [],
  shooting: false
};

// ===== DOM =====
const $ = id => document.getElementById(id);
const screens = {
  setup: $('setupScreen'),
  camera: $('cameraScreen'),
  result: $('resultScreen')
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

// ===== 셋업 UI 렌더 =====
function renderFrames() {
  const grid = $('frameGrid');
  grid.innerHTML = '';
  FRAMES.forEach(f => {
    const div = document.createElement('div');
    div.className = 'frame-option' + (f.id === state.frame ? ' selected' : '');
    div.style.background = f.bg;
    div.style.color = f.text;
    div.textContent = f.name;
    div.onclick = () => {
      state.frame = f.id;
      renderFrames();
    };
    grid.appendChild(div);
  });
}

function renderFilters() {
  const grid = $('filterGrid');
  grid.innerHTML = '';
  FILTERS.forEach(f => {
    const div = document.createElement('div');
    div.className = 'filter-option' + (f.id === state.filter ? ' selected' : '');
    div.innerHTML = `<div class="filter-preview" style="background:${f.preview}">${f.name}</div>`;
    div.onclick = () => {
      state.filter = f.id;
      renderFilters();
    };
    grid.appendChild(div);
  });
}

document.querySelectorAll('.count-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.count = parseInt(btn.dataset.count);
  };
});

renderFrames();
renderFilters();

// ===== 카메라 =====
async function startCamera() {
  try {
    if (state.stream) {
      state.stream.getTracks().forEach(t => t.stop());
    }
    const constraints = {
      video: {
        facingMode: state.facing,
        width: { ideal: 1280 },
        height: { ideal: 1280 }
      },
      audio: false
    };
    state.stream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = $('video');
    video.srcObject = state.stream;
    video.style.filter = FILTERS.find(f => f.id === state.filter).filter;
    // 후면카메라일 때는 미러 해제
    if (state.facing === 'environment') {
      video.classList.add('no-mirror');
    } else {
      video.classList.remove('no-mirror');
    }
    return true;
  } catch (e) {
    showError('카메라 접근에 실패했어요: ' + e.message + '\nHTTPS 환경에서 권한을 허용했는지 확인해 주세요.');
    return false;
  }
}

function stopCamera() {
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
}

function showError(msg) {
  $('errorBox').innerHTML = `<div class="error">${msg}</div>`;
  setTimeout(() => $('errorBox').innerHTML = '', 5000);
}

// ===== 미리보기 스트립 =====
function renderPreviewStrip() {
  const strip = $('previewStrip');
  strip.innerHTML = '';
  for (let i = 0; i < state.count; i++) {
    const t = document.createElement('div');
    t.className = 'preview-thumb';
    if (state.shots[i]) {
      const img = document.createElement('img');
      img.src = state.shots[i];
      t.appendChild(img);
    } else {
      t.textContent = i + 1;
    }
    strip.appendChild(t);
  }
}

// ===== 촬영 로직 =====
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function countdown(seconds) {
  const el = $('countdown');
  for (let i = seconds; i > 0; i--) {
    el.textContent = i;
    el.classList.remove('show');
    void el.offsetWidth; // reflow for re-trigger
    el.classList.add('show');
    await sleep(1000);
  }
  el.classList.remove('show');
}

function captureFrame() {
  const video = $('video');
  const canvas = $('captureCanvas');
  const ctx = canvas.getContext('2d');

  // 정사각형 크롭
  const size = Math.min(video.videoWidth, video.videoHeight);
  canvas.width = size;
  canvas.height = size;
  const sx = (video.videoWidth - size) / 2;
  const sy = (video.videoHeight - size) / 2;

  // 필터 적용
  ctx.filter = FILTERS.find(f => f.id === state.filter).filter;

  // 전면카메라면 좌우 반전
  if (state.facing === 'user') {
    ctx.save();
    ctx.translate(size, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
    ctx.restore();
  } else {
    ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
  }

  // 플래시 효과
  const flash = $('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 200);

  return canvas.toDataURL('image/jpeg', 0.92);
}

async function runShootSequence() {
  if (state.shooting) return;
  state.shooting = true;
  $('shootBtn').disabled = true;
  $('shootBtn').textContent = '촬영 중...';

  state.shots = [];
  for (let i = 0; i < state.count; i++) {
    $('progress').textContent = `${i + 1}/${state.count}`;
    await countdown(3);
    const dataUrl = captureFrame();
    state.shots.push(dataUrl);
    renderPreviewStrip();
    if (i < state.count - 1) {
      await sleep(1200);
    }
  }

  state.shooting = false;
  await sleep(500);
  composeResult();
}

// ===== 결과 합성 =====
function composeResult() {
  const frame = FRAMES.find(f => f.id === state.frame);
  const canvas = $('resultCanvas');
  const ctx = canvas.getContext('2d');

  // 인생네컷 비율: 폭 600, 사진 영역 정사각형, 좌우 마진 + 사진 사이 간격 + 하단 큰 여백(타이틀)
  const W = 600;
  const margin = 30;
  const photoW = W - margin * 2;
  const photoH = photoW; // 정사각형
  const gap = 16;
  const bottomBig = 90;
  const H = margin + (photoH + gap) * state.count - gap + bottomBig;

  canvas.width = W;
  canvas.height = H;

  // 배경
  ctx.fillStyle = frame.bg;
  ctx.fillRect(0, 0, W, H);

  // 사진 그리기
  let loaded = 0;
  state.shots.forEach((src, i) => {
    const img = new Image();
    img.onload = () => {
      const y = margin + i * (photoH + gap);
      ctx.drawImage(img, margin, y, photoW, photoH);
      loaded++;
      if (loaded === state.shots.length) {
        drawText();
      }
    };
    img.src = src;
  });

  function drawText() {
    ctx.fillStyle = frame.text;
    ctx.textAlign = 'center';

    const baseY = margin + (photoH + gap) * state.count - gap;
    // 타이틀
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.fillText('LIFE 4 CUTS', W / 2, baseY + 38);
    // 날짜
    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    ctx.font = '16px -apple-system, sans-serif';
    ctx.globalAlpha = 0.7;
    ctx.fillText(dateStr, W / 2, baseY + 68);
    ctx.globalAlpha = 1;
  }

  stopCamera();
  showScreen('result');
}

// ===== 다운로드 =====
function downloadResult() {
  const canvas = $('resultCanvas');
  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
  const filename = `life4cuts_${ts}.png`;

  canvas.toBlob(blob => {
    // iOS Safari 대응: 새 창에서 길게 누르기 안내
    const ua = navigator.userAgent;
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

    if (isIOS) {
      // iOS는 download 속성이 잘 안 먹히므로 새 탭으로 열어서 사용자가 저장하게
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 1000);
      alert('💾 새 창에서 이미지를 길게 눌러 "이미지 저장"을 선택해 주세요!');
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  }, 'image/png');
}

// ===== 이벤트 =====
$('startBtn').onclick = async () => {
  $('progress').textContent = `1/${state.count}`;
  state.shots = [];
  renderPreviewStrip();
  showScreen('camera');
  const ok = await startCamera();
  if (!ok) {
    showScreen('setup');
  }
};

$('switchCam').onclick = async () => {
  state.facing = state.facing === 'user' ? 'environment' : 'user';
  await startCamera();
};

$('shootBtn').onclick = () => {
  $('shootBtn').textContent = '📸 시작';
  $('shootBtn').disabled = false;
  runShootSequence();
};

$('cancelBtn').onclick = () => {
  stopCamera();
  showScreen('setup');
};

$('downloadBtn').onclick = downloadResult;

$('retakeBtn').onclick = async () => {
  state.shots = [];
  renderPreviewStrip();
  showScreen('camera');
  const ok = await startCamera();
  if (!ok) showScreen('setup');
};

$('newBtn').onclick = () => {
  state.shots = [];
  showScreen('setup');
};

// 페이지 떠날 때 카메라 정리
window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
